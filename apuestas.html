<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mundiporra 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f0f4f8;color:#1a202c;font-size:14px;padding:16px}
h1{font-size:22px;font-weight:700;text-align:center;margin-bottom:4px}
.sub{text-align:center;color:#718096;font-size:13px;margin-bottom:20px}
.tabs{display:flex;border-bottom:2px solid #e2e8f0;margin-bottom:20px}
.tab{padding:10px 24px;border:none;background:none;color:#718096;cursor:pointer;font-size:14px;font-weight:500;border-bottom:3px solid transparent;margin-bottom:-2px}
.tab.active{color:#1d9e75;border-bottom-color:#1d9e75;font-weight:700}
.panel{display:none}.panel.active{display:block}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.stitle{font-size:11px;font-weight:700;color:#718096;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
select{width:100%;padding:9px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;font-family:Arial,sans-serif;background:#fff;color:#1a202c}
select:focus{outline:none;border-color:#1d9e75}
.msg{font-size:12px;color:#718096;margin-top:8px;text-align:center}
.msg.err{color:#c53030}
.groups-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px}
.gc{background:#fff;border:1px solid #e2e8f0;border-radius:8px;overflow:hidden}
.gh{background:#1d9e75;color:#fff;padding:6px 10px;font-size:12px;font-weight:700}
.ti{display:flex;align-items:center;gap:6px;padding:5px 8px;border-bottom:1px solid #f0f4f8;font-size:12px}
.ti:last-child{border-bottom:none}
.pb{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0}
.p1{background:#f5c842;color:#7a5c00}
.p2{background:#b0bec5;color:#37474f}
.p3{background:#e2e8f0;color:#718096}
.p4{background:#e2e8f0;color:#a0aec0}
.tn{flex:1;font-size:11px}
.bracket-wrap{overflow-x:auto;padding:4px 0 8px}
.bracket{display:flex;align-items:stretch;min-width:900px}
.bcol{display:flex;flex-direction:column;flex:1;min-width:100px;padding:0 3px}
.bhead{text-align:center;font-size:10px;font-weight:700;color:#718096;text-transform:uppercase;padding:4px 0 6px;border-bottom:2px solid #e2e8f0;margin-bottom:6px}
.bmatch{border:1px solid #e2e8f0;border-radius:6px;overflow:hidden;background:#fff;margin:3px 0}
.bteam{display:flex;align-items:center;gap:4px;padding:4px 7px;font-size:11px;min-height:24px}
.bteam.win{background:#f0fdf4;color:#276749;font-weight:700}
.bteam.tbd{color:#a0aec0;font-style:italic}
.bsep{height:1px;background:#e2e8f0}
.bcenter{display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:120px;padding:0 6px}
.ctrophy{border:2px solid #f5c842;border-radius:10px;padding:10px;background:#fffde7;text-align:center;min-width:100px}
.ctitle{font-size:10px;font-weight:700;color:#7a5c00;text-transform:uppercase;margin-bottom:6px}
.cteam{font-size:12px;font-weight:700;color:#7a5c00;padding:4px}
.extras{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ebox{background:#f7fafc;border-radius:8px;padding:8px 10px}
.elabel{font-size:10px;color:#718096;font-weight:700;text-transform:uppercase;margin-bottom:2px}
.eval{font-size:13px;font-weight:600}
.rtable{width:100%;border-collapse:collapse}
.rtable th{background:#1a202c;color:#fff;padding:8px 10px;font-size:11px;font-weight:700;text-align:left}
.rtable td{padding:8px 10px;border-bottom:1px solid #f0f4f8;font-size:13px}
.rtable tr:hover td{background:#f7fafc}
.rtable tr:last-child td{border-bottom:none}
.rpos{font-weight:700;text-align:center}
.rpos.g1{color:#b8860b}.rpos.g2{color:#708090}.rpos.g3{color:#a0522d}
.rpill{display:inline-block;padding:2px 10px;border-radius:999px;background:#e2e8f0;font-weight:700}
.rpill.g1{background:#fef9c3;color:#7a5c00}
.rpill.g2{background:#f1f5f9;color:#475569}
.rpill.g3{background:#fff5f5;color:#a0522d}
.lupdate{font-size:11px;color:#a0aec0;text-align:right;margin-top:8px;font-style:italic}
.empty{text-align:center;padding:30px;color:#a0aec0}
</style>
</head>
<body>
<h1>Mundiporra 2026</h1>
<p class="sub">Consulta les apostes i el ranking de tots els participants</p>

<div class="tabs">
  <button class="tab active" onclick="showTab('apostes',this)">Apostes</button>
  <button class="tab" onclick="showTab('ranking',this)">Ranking</button>
</div>

<div id="panel-apostes" class="panel active">
  <div class="card">
    <p class="stitle">Selecciona un participant</p>
    <select id="sel" onchange="loadBet()">
      <option value="">-- Carregant... --</option>
    </select>
    <div id="msg" class="msg"></div>
  </div>
  <div id="content"></div>
</div>

<div id="panel-ranking" class="panel">
  <div class="card">
    <p class="stitle">Classificacio general</p>
    <div id="rankContent"><p class="empty">Carregant...</p></div>
  </div>
</div>

<script>
var GS = "https://script.google.com/macros/s/AKfycbz5zEsBi3ZLEYMMtTL_27n09y7kZ8tEvdzNvMzWAlu9PM3qlSChF-ENtnrxJiU9BeJO/exec";
var bets = [];

function showTab(tab, btn) {
  var panels = document.querySelectorAll('.panel');
  var tabs = document.querySelectorAll('.tab');
  for (var i=0; i<panels.length; i++) panels[i].classList.remove('active');
  for (var i=0; i<tabs.length; i++) tabs[i].classList.remove('active');
  document.getElementById('panel-'+tab).classList.add('active');
  btn.classList.add('active');
  if (tab === 'ranking') loadRanking();
}

function jsonp(url, cb) {
  var id = 'cb_' + Date.now();
  var s = document.createElement('script');
  s.src = url + '&callback=' + id;
  var timer = setTimeout(function() {
    delete window[id]; s.remove();
    cb(null, new Error('Timeout'));
  }, 12000);
  window[id] = function(data) {
    clearTimeout(timer); delete window[id]; s.remove();
    cb(data, null);
  };
  s.onerror = function() {
    clearTimeout(timer); delete window[id]; s.remove();
    cb(null, new Error('Error de xarxa'));
  };
  document.head.appendChild(s);
}

function loadAll() {
  var sel = document.getElementById('sel');
  var msg = document.getElementById('msg');
  jsonp(GS + '?action=getAll', function(data, err) {
    if (err || !data || !data.ok) {
      msg.className = 'msg err';
      msg.textContent = 'Error: ' + (err ? err.message : (data && data.error) || 'desconegut');
      sel.innerHTML = '<option value="">-- Error --</option>';
      return;
    }
    bets = (data.bets || []).filter(function(b) { return b.nombre; });
    var opts = '<option value="">-- Tria un participant --</option>';
    for (var i=0; i<bets.length; i++) {
      opts += '<option value="' + i + '">' + esc(bets[i].nombre) + '</option>';
    }
    sel.innerHTML = opts;
    msg.textContent = bets.length + ' participants carregats';
  });
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function loadBet() {
  var sel = document.getElementById('sel');
  var content = document.getElementById('content');
  if (!sel.value) { content.innerHTML = ''; return; }
  renderBet(bets[parseInt(sel.value)]);
}

var GK = ['A','B','C','D','E','F','G','H','I','J','K','L'];

function renderBet(b) {
  var content = document.getElementById('content');
  content.innerHTML = '';

  // GRUPS
  var gc = document.createElement('div'); gc.className = 'card';
  gc.innerHTML = '<p class="stitle">Fase de Grups</p>';
  var gg = document.createElement('div'); gg.className = 'groups-grid';
  GK.forEach(function(g) {
    var teams = [1,2,3,4].map(function(p){ return b['G'+g+'_'+p]; }).filter(Boolean);
    if (!teams.length) return;
    var card = document.createElement('div'); card.className = 'gc';
    card.innerHTML = '<div class="gh">Grup ' + g + '</div>';
    var labels = ['1r','2n','3r','4t'];
    var cls = ['p1','p2','p3','p4'];
    teams.forEach(function(t,i) {
      card.innerHTML += '<div class="ti"><div class="pb '+cls[i]+'">'+labels[i]+'</div><span class="tn">'+esc(t)+'</span></div>';
    });
    gg.appendChild(card);
  });
  gc.appendChild(gg);
  content.appendChild(gc);

  // BRACKET
  var bc = document.createElement('div'); bc.className = 'card';
  bc.style.padding = '12px';
  bc.innerHTML = '<p class="stitle">Eliminatories</p>';
  var bw = document.createElement('div'); bw.className = 'bracket-wrap';
  var bt = document.createElement('div'); bt.className = 'bracket';
  bw.appendChild(bt); bc.appendChild(bw);
  content.appendChild(bc);
  buildBracket(bt, b);

  // APOSTES ESPECIALS
  var ec = document.createElement('div'); ec.className = 'card';
  ec.innerHTML = '<p class="stitle">Apostes Especials</p>';
  var eg = document.createElement('div'); eg.className = 'extras';
  var extras = [
    ['Equip golejador', b.goleador],
    ['Equip revelacio', b.revelacion],
    ['Pichichi', b.pichichi],
    ['Pachocho', b.pachocho]
  ];
  extras.forEach(function(e) {
    eg.innerHTML += '<div class="ebox"><div class="elabel">'+esc(e[0])+'</div><div class="eval">'+(e[1]?esc(e[1]):'--')+'</div></div>';
  });
  ec.appendChild(eg);
  content.appendChild(ec);
}

// BRACKET RECONSTRUCTION
var R32 = ['m74','m77','m73','m75','m83','m84','m81','m82','m76','m78','m79','m80','m86','m88','m85','m87'];
var R32SRC = {
  m74:{a:{t:'g',g:'E',p:1},b:{t:'3',i:0}},
  m77:{a:{t:'g',g:'I',p:1},b:{t:'3',i:1}},
  m73:{a:{t:'g',g:'A',p:2},b:{t:'g',g:'B',p:2}},
  m75:{a:{t:'g',g:'F',p:1},b:{t:'g',g:'C',p:2}},
  m83:{a:{t:'g',g:'K',p:2},b:{t:'g',g:'L',p:2}},
  m84:{a:{t:'g',g:'H',p:1},b:{t:'g',g:'J',p:2}},
  m81:{a:{t:'g',g:'D',p:1},b:{t:'3',i:4}},
  m82:{a:{t:'g',g:'G',p:1},b:{t:'3',i:5}},
  m76:{a:{t:'g',g:'C',p:1},b:{t:'g',g:'F',p:2}},
  m78:{a:{t:'g',g:'E',p:2},b:{t:'g',g:'I',p:2}},
  m79:{a:{t:'g',g:'A',p:1},b:{t:'3',i:2}},
  m80:{a:{t:'g',g:'L',p:1},b:{t:'3',i:3}},
  m86:{a:{t:'g',g:'J',p:1},b:{t:'g',g:'H',p:2}},
  m88:{a:{t:'g',g:'D',p:2},b:{t:'g',g:'G',p:2}},
  m85:{a:{t:'g',g:'B',p:1},b:{t:'3',i:6}},
  m87:{a:{t:'g',g:'K',p:1},b:{t:'3',i:7}}
};

function resolveSrc(src, b, t3) {
  if (src.t === 'g') return b['G'+src.g+'_'+src.p] || null;
  if (src.t === '3') return t3[src.i] || null;
  return null;
}

function findWinner(candidates, pool) {
  for (var i=0; i<pool.length; i++) {
    for (var j=0; j<candidates.length; j++) {
      if (pool[i] && candidates[j] && pool[i].toLowerCase() === candidates[j].toLowerCase()) {
        var w = pool[i];
        pool.splice(i, 1);
        return w;
      }
    }
  }
  return null;
}

function buildBracket(tree, b) {
  var t3 = (b.terceros||'').split('|').map(function(s){return s.trim();}).filter(Boolean);
  var r32pool = (b.r32_winners||'').split('|').map(function(s){return s.trim();}).filter(Boolean);
  var octpool = (b.oct_winners||'').split('|').map(function(s){return s.trim();}).filter(Boolean);
  var qfpool  = (b.qf_winners||'').split('|').map(function(s){return s.trim();}).filter(Boolean);
  var sfpool  = (b.sf_winners||'').split('|').map(function(s){return s.trim();}).filter(Boolean);
  var champ   = b.campeon || b.final_winner || '';

  var W = {}; // matchId -> winner
  var T = {}; // matchId -> [teamA, teamB]

  R32.forEach(function(mid) {
    var src = R32SRC[mid];
    var a = resolveSrc(src.a, b, t3);
    var z = resolveSrc(src.b, b, t3);
    T[mid] = [a, z];
    W[mid] = findWinner([a,z], r32pool.slice()) || null;
    // consume from pool
    findWinner([a,z], r32pool);
  });

  var OCT = [
    {id:'m89',from:['m74','m77']},{id:'m90',from:['m73','m75']},
    {id:'m91',from:['m76','m78']},{id:'m92',from:['m79','m80']},
    {id:'m93',from:['m83','m84']},{id:'m94',from:['m81','m82']},
    {id:'m95',from:['m86','m88']},{id:'m96',from:['m85','m87']}
  ];
  OCT.forEach(function(o) {
    var a = W[o.from[0]], z = W[o.from[1]];
    T[o.id] = [a,z];
    W[o.id] = findWinner([a,z], octpool);
  });

  var QF = [
    {id:'m97',from:['m89','m90']},{id:'m98',from:['m93','m94']},
    {id:'m99',from:['m91','m92']},{id:'m100',from:['m95','m96']}
  ];
  QF.forEach(function(q) {
    var a = W[q.from[0]], z = W[q.from[1]];
    T[q.id] = [a,z];
    W[q.id] = findWinner([a,z], qfpool);
  });

  var SF = [
    {id:'m101',from:['m97','m98']},{id:'m102',from:['m99','m100']}
  ];
  SF.forEach(function(s) {
    var a = W[s.from[0]], z = W[s.from[1]];
    T[s.id] = [a,z];
    W[s.id] = findWinner([a,z], sfpool);
  });

  T['m104'] = [W['m101'], W['m102']];
  W['m104'] = champ || null;

  function teamRow(name, isWin) {
    var d = document.createElement('div');
    d.className = 'bteam' + (isWin ? ' win' : '') + (name ? '' : ' tbd');
    d.innerHTML = '<span class="tn">' + (name ? esc(name) : '--') + '</span>';
    return d;
  }

  function matchBox(mid) {
    var wrap = document.createElement('div'); wrap.className = 'bmatch';
    var teams = T[mid] || [null,null];
    var winner = W[mid];
    wrap.appendChild(teamRow(teams[0], winner && teams[0] && teams[0]===winner));
    var sep = document.createElement('div'); sep.className = 'bsep'; wrap.appendChild(sep);
    wrap.appendChild(teamRow(teams[1], winner && teams[1] && teams[1]===winner));
    return wrap;
  }

  function makeCol(label, ids) {
    var col = document.createElement('div'); col.className = 'bcol';
    var h = document.createElement('div'); h.className = 'bhead'; h.textContent = label; col.appendChild(h);
    var wrap = document.createElement('div');
    wrap.style.cssText = 'display:flex;flex-direction:column;flex:1;justify-content:space-around;gap:3px';
    ids.forEach(function(id){ wrap.appendChild(matchBox(id)); });
    col.appendChild(wrap);
    return col;
  }

  // Left half
  var left = document.createElement('div'); left.style.cssText = 'display:flex;flex:1;align-items:stretch';
  left.appendChild(makeCol('Ronda 32', ['m74','m77','m73','m75','m83','m84','m81','m82']));
  left.appendChild(makeCol('Octavos', ['m89','m90','m93','m94']));
  left.appendChild(makeCol('Quarts', ['m97','m98']));
  left.appendChild(makeCol('Semifinal', ['m101']));
  tree.appendChild(left);

  // Center
  var center = document.createElement('div'); center.className = 'bcenter';
  var fh = document.createElement('div'); fh.className = 'bhead'; fh.style.marginBottom='8px'; fh.textContent = 'Final';
  center.appendChild(fh);
  var fm = matchBox('m104'); fm.style.marginBottom = '10px'; center.appendChild(fm);
  var ct = document.createElement('div'); ct.className = 'ctrophy';
  ct.innerHTML = '<div class="ctitle">Campion</div>';
  if (champ) {
    ct.innerHTML += '<div class="cteam">' + esc(champ) + '</div>';
  } else {
    ct.innerHTML += '<div style="font-size:11px;color:#a0aec0">--</div>';
  }
  center.appendChild(ct);
  tree.appendChild(center);

  // Right half
  var right = document.createElement('div'); right.style.cssText = 'display:flex;flex:1;align-items:stretch;flex-direction:row-reverse';
  right.appendChild(makeCol('Ronda 32', ['m76','m78','m79','m80','m86','m88','m85','m87']));
  right.appendChild(makeCol('Octavos', ['m91','m92','m95','m96']));
  right.appendChild(makeCol('Quarts', ['m99','m100']));
  right.appendChild(makeCol('Semifinal', ['m102']));
  tree.appendChild(right);
}

function loadRanking() {
  var el = document.getElementById('rankContent');
  el.innerHTML = '<p class="empty">Carregant ranking...</p>';
  jsonp(GS + '?action=getRanking', function(data, err) {
    if (err || !data || !data.ok) {
      el.innerHTML = '<p class="empty" style="color:#c53030">Error: ' + (err ? err.message : (data && data.error) || 'desconegut') + '</p>';
      return;
    }
    var rows = data.ranking;
    if (!rows || rows.length <= 1) {
      el.innerHTML = '<p class="empty">Encara no hi ha ranking. L\'admin ha de calcular-lo primer.</p>';
      return;
    }
    var headers = rows[0];
    var dataRows = rows.slice(1).filter(function(r){ return r[0] && !isNaN(parseInt(r[0])); });
    // Columna 2 es el email — la excluimos del ranking publico
    var skipCol = 2;
    var html = '<table class="rtable"><thead><tr>';
    headers.forEach(function(h,i){
      if (i === skipCol) return;
      html += '<th' + (i===headers.length-1?' style="text-align:right"':'') + '>' + esc(String(h)) + '</th>';
    });
    html += '</tr></thead><tbody>';
    dataRows.forEach(function(row) {
      var pos = parseInt(row[0]);
      var pc = pos===1?'g1':pos===2?'g2':pos===3?'g3':'';
      var em = pos===1?'1r':pos===2?'2n':pos===3?'3r':pos;
      html += '<tr>';
      row.forEach(function(cell,i) {
        if (i === skipCol) return;
        if (i===0) html += '<td class="rpos '+pc+'">' + em + '</td>';
        else if (i===row.length-1) html += '<td style="text-align:right"><span class="rpill '+pc+'">' + esc(String(cell||0)) + ' pts</span></td>';
        else html += '<td>' + esc(String(cell||'')) + '</td>';
      });
      html += '</tr>';
    });
    html += '</tbody></table>';
    var last = rows[rows.length-1];
    if (last && String(last[0]).indexOf('actualitz') >= 0) {
      html += '<p class="lupdate">' + esc(String(last[0])) + '</p>';
    }
    el.innerHTML = html;
  });
}

window.onload = function() { loadAll(); };
</script>
</body>
</html>
