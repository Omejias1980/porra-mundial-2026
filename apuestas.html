<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚽ Mundiporra 2026 — Apostes de tothom</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0f4f8;color:#1a202c;font-size:14px;padding:16px;min-height:100vh}
h1{font-size:24px;font-weight:700;text-align:center;margin-bottom:4px}
.subtitle{text-align:center;color:#718096;font-size:13px;margin-bottom:20px}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:20px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.selector-row{display:flex;gap:10px;align-items:center;margin-bottom:4px}
.selector-row select{flex:1;padding:10px 12px;border:1px solid #e2e8f0;border-radius:8px;background:#fff;color:#1a202c;font-size:14px;font-family:inherit}
.selector-row select:focus{outline:none;border-color:#1d9e75}
.status{font-size:12px;color:#718096;margin-top:8px;text-align:center}
.status.err{color:#c53030}

.groups-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:8px}
.group-card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;overflow:hidden}
.group-header{background:#1d9e75;color:#fff;padding:6px 10px;font-size:12px;font-weight:600}
.team-item{display:flex;align-items:center;gap:6px;padding:6px 9px;border-bottom:1px solid #f0f4f8}
.team-item:last-child{border-bottom:none}
.pos-badge{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;flex-shrink:0}
.pos-badge.p1{background:#f5c842;color:#7a5c00}
.pos-badge.p2{background:#b0bec5;color:#37474f}
.pos-badge.p3{background:#e2e8f0;color:#718096}
.pos-badge.p4{background:#e2e8f0;color:#a0aec0;opacity:.7}
.tf{font-size:15px;flex-shrink:0}.tn{flex:1;font-size:11px;font-weight:500}

.section-title{font-size:11px;font-weight:600;color:#718096;text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}

/* ── BRACKET — misma estructura visual que el formulario ── */
.bracket-scroll{overflow-x:auto;padding:8px 0 16px}
.bracket-tree{display:flex;align-items:stretch;gap:0;min-width:1100px;position:relative}
.b-col{display:flex;flex-direction:column;justify-content:space-around;padding:0 4px;flex:1;min-width:105px;position:relative}
.b-col-header{text-align:center;font-size:10px;font-weight:700;color:#718096;text-transform:uppercase;letter-spacing:.5px;padding:4px 0 8px;border-bottom:2px solid #e2e8f0;margin-bottom:8px}
.b-match{display:flex;flex-direction:column;margin:3px 0;border:1px solid #e2e8f0;border-radius:7px;overflow:hidden;background:#fff}
.b-team{display:flex;align-items:center;gap:5px;padding:5px 8px;font-size:11px;min-height:28px}
.b-team.winner{background:#f0fdf4;border-color:#68d391;color:#276749;font-weight:600}
.b-team.tbd{color:#a0aec0;font-style:italic;background:#fafafa}
.b-flag{font-size:14px;flex-shrink:0;width:18px;text-align:center}
.b-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.b-sep{height:1px;background:#e2e8f0}

.b-center{display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:130px;padding:0 8px}
.champ-trophy{text-align:center;border:2px solid #f5c842;border-radius:14px;padding:12px 10px;background:#fffde7;box-shadow:0 2px 12px rgba(245,200,66,.3);min-width:110px}
.champ-trophy h3{font-size:11px;font-weight:700;color:#7a5c00;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.champ-team{display:flex;align-items:center;gap:5px;padding:6px 8px;border-radius:7px;font-size:12px;justify-content:center}
.champ-team.selected{background:#fef9c3;font-weight:700;color:#7a5c00}
.champ-empty{font-size:11px;color:#a0aec0;font-style:italic;text-align:center;padding:8px 0}

.extras-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.extra-box{background:#f7fafc;border-radius:8px;padding:8px 10px}
.extra-label{font-size:10px;color:#718096;font-weight:600;text-transform:uppercase;margin-bottom:2px}
.extra-val{font-size:13px;font-weight:600;color:#1a202c}

.empty-state{text-align:center;padding:40px 20px;color:#a0aec0}
.empty-state .ico{font-size:36px;margin-bottom:10px}
</style>
</head>
<body>

<h1>⚽ Mundiporra 2026</h1>
<p class="subtitle">Consulta les apostes de tots els participants</p>

<div class="card">
  <p class="section-title">Selecciona un participant</p>
  <div class="selector-row">
    <select id="participantSelect" onchange="loadParticipant()">
      <option value="">-- Carregant participants... --</option>
    </select>
  </div>
  <div id="statusMsg" class="status"></div>
</div>

<div id="content"></div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz5zEsBi3ZLEYMMtTL_27n09y7kZ8tEvdzNvMzWAlu9PM3qlSChF-ENtnrxJiU9BeJO/exec";

const GROUPS_KEYS = ['A','B','C','D','E','F','G','H','I','J','K','L'];

const FLAGS = {
  'México':'🇲🇽','Corea del Sur':'🇰🇷','Sudáfrica':'🇿🇦','Rep. Checa':'🇨🇿',
  'Canadá':'🇨🇦','Bosnia-Herz.':'🇧🇦','Qatar':'🇶🇦','Suiza':'🇨🇭',
  'Brasil':'🇧🇷','Marruecos':'🇲🇦','Escocia':'🏴','Haití':'🇭🇹',
  'EE.UU.':'🇺🇸','Paraguay':'🇵🇾','Australia':'🇦🇺','Turquía':'🇹🇷',
  'Alemania':'🇩🇪','Ecuador':'🇪🇨','C. de Marfil':'🇨🇮','Curazao':'🇨🇼',
  'Países Bajos':'🇳🇱','Japón':'🇯🇵','Suecia':'🇸🇪','Túnez':'🇹🇳',
  'Bélgica':'🇧🇪','Irán':'🇮🇷','Egipto':'🇪🇬','Nueva Zelanda':'🇳🇿',
  'España':'🇪🇸','Uruguay':'🇺🇾','Arabia Saudita':'🇸🇦','Cabo Verde':'🇨🇻',
  'Francia':'🇫🇷','Senegal':'🇸🇳','Noruega':'🇳🇴','Irak':'🇮🇶',
  'Argentina':'🇦🇷','Austria':'🇦🇹','Argelia':'🇩🇿','Jordania':'🇯🇴',
  'Portugal':'🇵🇹','Colombia':'🇨🇴','R.D. Congo':'🇨🇩','Uzbekistán':'🇺🇿',
  'Inglaterra':'🏴','Croacia':'🇭🇷','Panamá':'🇵🇦','Ghana':'🇬🇭'
};
function flagFor(name){ return FLAGS[name] || '🏳️'; }

let allBets = [];

function jsonpCall(url, cbName, timeout=12000){
  return new Promise((resolve,reject)=>{
    const old=document.getElementById('sc_'+cbName); if(old) old.remove();
    const timer=setTimeout(()=>{cleanup();reject(new Error('Timeout'));},timeout);
    function cleanup(){clearTimeout(timer);const s=document.getElementById('sc_'+cbName);if(s)s.remove();delete window[cbName];}
    window[cbName]=(data)=>{cleanup();resolve(data);};
    const script=document.createElement('script');
    script.id='sc_'+cbName;
    script.src=url+'&callback='+cbName;
    script.onerror=()=>{cleanup();reject(new Error('Error de red'));};
    document.head.appendChild(script);
  });
}

async function loadAllBets(){
  const sel=document.getElementById('participantSelect');
  const status=document.getElementById('statusMsg');
  try{
    const data = await jsonpCall(SCRIPT_URL+'?action=getAll','cb_loadall');
    if(!data.ok){ status.className='status err'; status.textContent='Error: '+data.error; return; }
    allBets = (data.bets||[]).filter(b=>b.nombre);
    sel.innerHTML = '<option value="">-- Tria un participant --</option>' +
      allBets.map((b,i)=>`<option value="${i}">${escapeHtml(b.nombre)}</option>`).join('');
    status.textContent = allBets.length + ' participants carregats';
  }catch(e){
    status.className='status err';
    status.textContent = 'No es va poder connectar: ' + e.message;
    sel.innerHTML = '<option value="">-- Error de connexió --</option>';
  }
}

function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function loadParticipant(){
  const sel=document.getElementById('participantSelect');
  const idx=sel.value;
  const content=document.getElementById('content');
  if(idx===''){ content.innerHTML=''; return; }
  renderBet(allBets[idx]);
}

function renderBet(bet){
  const content=document.getElementById('content');
  content.innerHTML = '';

  // ── GRUPOS ──
  const groupsCard=document.createElement('div');
  groupsCard.className='card';
  groupsCard.innerHTML='<p class="section-title">📋 Fase de grups</p>';
  const groupsGrid=document.createElement('div');
  groupsGrid.className='groups-grid';
  GROUPS_KEYS.forEach(g=>{
    const teams=[1,2,3,4].map(p=>bet['G'+g+'_'+p]).filter(Boolean);
    if(teams.length===0) return;
    const gc=document.createElement('div');
    gc.className='group-card';
    gc.innerHTML=`<div class="group-header">Grup ${g}</div>`;
    teams.forEach((t,i)=>{
      const pc=['p1','p2','p3','p4'][i], pl=['1r','2n','3r','4t'][i];
      gc.innerHTML+=`<div class="team-item"><div class="pos-badge ${pc}">${pl}</div><span class="tf">${flagFor(t)}</span><span class="tn">${t}</span></div>`;
    });
    groupsGrid.appendChild(gc);
  });
  groupsCard.appendChild(groupsGrid);
  content.appendChild(groupsCard);

  // ── BRACKET (misma estructura visual que el formulario) ──
  const bracketCard=document.createElement('div');
  bracketCard.className='card';
  bracketCard.style.padding='12px';
  bracketCard.innerHTML='<p class="section-title" style="margin-left:8px">🏆 Eliminatòries</p>';
  const scrollWrap=document.createElement('div');
  scrollWrap.className='bracket-scroll';
  const tree=document.createElement('div');
  tree.className='bracket-tree';
  scrollWrap.appendChild(tree);
  bracketCard.appendChild(scrollWrap);
  content.appendChild(bracketCard);

  buildAndRenderBracket(tree, bet);

  // ── EXTRAS ──
  const extrasCard=document.createElement('div');
  extrasCard.className='card';
  extrasCard.innerHTML='<p class="section-title">🌟 Apostes especials</p>';
  const grid=document.createElement('div');
  grid.className='extras-grid';
  const extras=[
    ['Equip golejador', bet.goleador],
    ['Equip revelació', bet.revelacion],
    ['Pichichi', bet.pichichi],
    ['Pachocho', bet.pachocho]
  ];
  extras.forEach(([label,val])=>{
    grid.innerHTML+=`<div class="extra-box"><div class="extra-label">${label}</div><div class="extra-val">${val||'—'}</div></div>`;
  });
  extrasCard.appendChild(grid);
  content.appendChild(extrasCard);
}

// ════════════════════════════════════════════════════════════
// RECONSTRUCCION DEL BRACKET OFICIAL — misma logica que el formulario,
// pero usando los datos YA GUARDADOS de la apuesta en vez de clicks en vivo
// ════════════════════════════════════════════════════════════

// Mismo orden oficial FIFA de partidos de Ronda 32 que en el formulario
const R32_ORDER = ['m74','m77','m73','m75','m83','m84','m81','m82','m76','m78','m79','m80','m86','m88','m85','m87'];
// Cruces de Octavos (mismos que el formulario): cada uno cruza 2 partidos de R32
const OCT_DEFS = [
  {id:'m89', from:['m74','m77']}, {id:'m90', from:['m73','m75']},
  {id:'m91', from:['m76','m78']}, {id:'m92', from:['m79','m80']},
  {id:'m93', from:['m83','m84']}, {id:'m94', from:['m81','m82']},
  {id:'m95', from:['m86','m88']}, {id:'m96', from:['m85','m87']},
];
// Cruces de Cuartos
const QF_DEFS = [
  {id:'m97',  from:['m89','m90']}, {id:'m98',  from:['m93','m94']},
  {id:'m99',  from:['m91','m92']}, {id:'m100', from:['m95','m96']},
];
// Cruces de Semis
const SF_DEFS = [
  {id:'m101', from:['m97','m98']}, {id:'m102', from:['m99','m100']},
];

function buildAndRenderBracket(tree, bet){
  // 1. Asignar cada equipo de r32_winners a su ID de partido oficial
  const r32List = (bet.r32_winners||'').split('|').map(s=>s.trim()).filter(Boolean);
  const winnerOf = {}; // mid -> nombre del equipo ganador de ese partido
  R32_ORDER.forEach((mid,i)=>{ winnerOf[mid] = r32List[i] || null; });

  // 2. Para cada cruce de Octavos, deducir cual de los 2 posibles paso
  //    comparando con oct_winners (la lista de los que SI pasaron)
  let octPool = (bet.oct_winners||'').split('|').map(s=>s.trim()).filter(Boolean);
  OCT_DEFS.forEach(def=>{
    const candA = winnerOf[def.from[0]];
    const candB = winnerOf[def.from[1]];
    let winner = null;
    if(candA && octPool.includes(candA)){ winner=candA; octPool.splice(octPool.indexOf(candA),1); }
    else if(candB && octPool.includes(candB)){ winner=candB; octPool.splice(octPool.indexOf(candB),1); }
    winnerOf[def.id] = winner;
  });

  // 3. Cuartos
  let qfPool = (bet.qf_winners||'').split('|').map(s=>s.trim()).filter(Boolean);
  QF_DEFS.forEach(def=>{
    const candA = winnerOf[def.from[0]];
    const candB = winnerOf[def.from[1]];
    let winner = null;
    if(candA && qfPool.includes(candA)){ winner=candA; qfPool.splice(qfPool.indexOf(candA),1); }
    else if(candB && qfPool.includes(candB)){ winner=candB; qfPool.splice(qfPool.indexOf(candB),1); }
    winnerOf[def.id] = winner;
  });

  // 4. Semis
  let sfPool = (bet.sf_winners||'').split('|').map(s=>s.trim()).filter(Boolean);
  SF_DEFS.forEach(def=>{
    const candA = winnerOf[def.from[0]];
    const candB = winnerOf[def.from[1]];
    let winner = null;
    if(candA && sfPool.includes(candA)){ winner=candA; sfPool.splice(sfPool.indexOf(candA),1); }
    else if(candB && sfPool.includes(candB)){ winner=candB; sfPool.splice(sfPool.indexOf(candB),1); }
    winnerOf[def.id] = winner;
  });

  const champ = bet.campeon || bet.final_winner || '';

  // ── Helpers para construir las cajas visuales (misma estructura que el formulario) ──
  function teamRow(name, isWinner){
    const row=document.createElement('div');
    row.className='b-team'+(isWinner?' winner':'')+(name?'':' tbd');
    row.innerHTML = name ? `<span class="b-flag">${flagFor(name)}</span><span class="b-name">${name}</span>` : `<span class="b-name">—</span>`;
    return row;
  }

  // Para Ronda 32 no tenemos los 2 equipos originales del partido (solo el ganador),
  // asi que mostramos el ganador junto a un marcador generico de "rival"
  function r32MatchBox(mid){
    const wrap=document.createElement('div'); wrap.className='b-match';
    const winner = winnerOf[mid];
    wrap.appendChild(teamRow(winner, true));
    const sep=document.createElement('div'); sep.className='b-sep'; wrap.appendChild(sep);
    wrap.appendChild(teamRow(null, false));
    return wrap;
  }

  function matchBox(defId, fromIds){
    const wrap=document.createElement('div'); wrap.className='b-match';
    const a = winnerOf[fromIds[0]];
    const b = winnerOf[fromIds[1]];
    const winner = winnerOf[defId];
    wrap.appendChild(teamRow(a, winner && a===winner));
    const sep=document.createElement('div'); sep.className='b-sep'; wrap.appendChild(sep);
    wrap.appendChild(teamRow(b, winner && b===winner));
    return wrap;
  }

  function makeCol(label, boxes){
    const col=document.createElement('div'); col.className='b-col';
    const h=document.createElement('div'); h.className='b-col-header'; h.textContent=label; col.appendChild(h);
    const wrap=document.createElement('div');
    wrap.style.cssText='display:flex;flex-direction:column;flex:1;justify-content:space-around;gap:4px';
    boxes.forEach(b=>wrap.appendChild(b));
    col.appendChild(wrap);
    return col;
  }

  // ── Construir mitad izquierda ──
  const leftHalf=document.createElement('div');
  leftHalf.style.cssText='display:flex;flex:1;align-items:stretch';

  const leftR32Ids = ['m74','m77','m73','m75','m83','m84','m81','m82'];
  leftHalf.appendChild(makeCol('Ronda 32', leftR32Ids.map(r32MatchBox)));

  leftHalf.appendChild(makeCol('Octavos', [
    matchBox('m89',['m74','m77']), matchBox('m90',['m73','m75']),
    matchBox('m93',['m83','m84']), matchBox('m94',['m81','m82'])
  ]));

  leftHalf.appendChild(makeCol('Cuartos', [
    matchBox('m97',['m89','m90']), matchBox('m98',['m93','m94'])
  ]));

  leftHalf.appendChild(makeCol('Semifinal', [
    matchBox('m101',['m97','m98'])
  ]));

  tree.appendChild(leftHalf);

  // ── Centro: Final + Campeón ──
  const center=document.createElement('div');
  center.className='b-center';

  const finalLabel=document.createElement('div');
  finalLabel.className='b-col-header';
  finalLabel.style.marginBottom='8px';
  finalLabel.textContent='Final';
  center.appendChild(finalLabel);

  const finalBox = matchBox('m104',['m101','m102']);
  finalBox.style.marginBottom='12px';
  center.appendChild(finalBox);

  const champBox=document.createElement('div');
  champBox.className='champ-trophy';
  champBox.innerHTML='<h3>🏆 Campeón</h3>';
  if(champ){
    const row=document.createElement('div');
    row.className='champ-team selected';
    row.innerHTML=`<span style="font-size:20px">${flagFor(champ)}</span><span style="font-size:13px;flex:1;font-weight:700">${champ}</span><span>🏆</span>`;
    champBox.appendChild(row);
  } else {
    champBox.innerHTML+='<div class="champ-empty">Sense campió triat</div>';
  }
  center.appendChild(champBox);
  tree.appendChild(center);

  // ── Mitad derecha (invertida) ──
  const rightHalf=document.createElement('div');
  rightHalf.style.cssText='display:flex;flex:1;align-items:stretch;flex-direction:row-reverse';

  const rightR32Ids = ['m76','m78','m79','m80','m86','m88','m85','m87'];
  rightHalf.appendChild(makeCol('Ronda 32', rightR32Ids.map(r32MatchBox)));

  rightHalf.appendChild(makeCol('Octavos', [
    matchBox('m91',['m76','m78']), matchBox('m92',['m79','m80']),
    matchBox('m95',['m86','m88']), matchBox('m96',['m85','m87'])
  ]));

  rightHalf.appendChild(makeCol('Cuartos', [
    matchBox('m99',['m91','m92']), matchBox('m100',['m95','m96'])
  ]));

  rightHalf.appendChild(makeCol('Semifinal', [
    matchBox('m102',['m99','m100'])
  ]));

  tree.appendChild(rightHalf);

  // Si no hay ningun dato, mostrar estado vacio
  if(!r32List.length && !champ){
    tree.innerHTML = '<div class="empty-state" style="width:100%"><div class="ico">📭</div>Aquest participant encara no ha completat el bracket</div>';
  }
}

loadAllBets();
</script>
</body>
</html>
